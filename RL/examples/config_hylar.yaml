data:
  train_files: ""  # Will be overridden by command line argument
  val_files: ""  # Will be overridden by command line argument
  prompt_key: problem
  answer_key: answer
  image_key: images
  max_prompt_length: 8192
  max_response_length: 2048
  rollout_batch_size: 64  # equivalent to verl's data.train_batch_size
  mini_rollout_batch_size: 64  # equivalent to verl's data.gen_batch_size
  val_batch_size: 512
  format_prompt: ./examples/format_prompt/hylar_format.jinja
  override_chat_template: null
  shuffle: true
  seed: 30
  max_pixels: 6347264  # 8096 * 28 * 28
  min_pixels: 100352  # 128 * 28 * 28
  filter_overlong_and_invalid_prompts: true
  train_max_samples: 54784  # -1 for all data
  val_max_samples: 4096  # -1 for all data

algorithm:
  adv_estimator: dapo
  # Standard PPO KL penalty control
  disable_kl: false
  use_kl_loss: true
  kl_penalty: low_var_kl
  kl_coef: 1.0e-2
  # Online filtering parameters
  online_filtering: true
  filter_key: accuracy
  filter_low: 0.1
  filter_high: 0.9
  answer_tag_filtering: true  # Filter groups where any response has 0 or >1 <answer> tags
  loss_avg_mode: token  # 'token' or 'seq'
  # Decoupled Hybrid PPO: separate token and latent PPO losses
  enable_decoupled_hybrid_ppo: true
  latent_clip_ratio_low: 0.05   # lower clip bound for latent tokens
  latent_clip_ratio_high: 0.05  # upper clip bound for latent tokens
  latent_clip_ratio_dual: 3.0   # dual-clip constant for latent tokens
  latent_loss_alpha: 0.5        # L_total = L^tok + alpha * L^lat
  # Closed-form vMF KL constraint on latent distribution drift
  enable_latent_vmf_kl: false
  latent_kl_coef: 1.0e-3

worker:
  actor:
    global_batch_size: 64
    micro_batch_size_per_device_for_update: 2
    micro_batch_size_per_device_for_experience: 8
    max_grad_norm: 1.0
    clip_ratio_low: 0.2
    clip_ratio_high: 0.28
    clip_ratio_dual: 3.0
    loss_avg_mode: token
    padding_free: true
    ulysses_sequence_parallel_size: 1
    model:
      model_path: ""
      enable_gradient_checkpointing: true
      trust_remote_code: false
      freeze_vision_tower: false
    optim:
      lr: 1e-6
      weight_decay: 1.0e-2
      strategy: adamw_bf16  # {adamw, adamw_bf16}
      lr_warmup_ratio: 0.0
    fsdp:
      enable_full_shard: true
      enable_cpu_offload: false
      enable_rank0_init: true
    offload:
      offload_params: true
      offload_optimizer: true

  rollout:
    n: 8
    temperature: 0.9
    top_p: 0.99
    max_num_seqs: 256
    gpu_memory_utilization: 0.75
    enforce_eager: True
    enable_chunked_prefill: false
    tensor_parallel_size: 1
    limit_images: 4  # vLLM rejects prompts with images if this is 0
    sampling_strategy: greedy
    repetition_penalty: 1.0
    offline_difficulty_sampling: false
    val_override_config:
      temperature: 0
      n: 1

  ref:
    fsdp:
      enable_full_shard: true
      enable_cpu_offload: true
      enable_rank0_init: true
    offload:
      offload_params: false

  reward:
    reward_type: batch
    reward_function: ./examples/reward_function/hylar_reward_function.py:compute_score
    skip_special_tokens: false

  rule_based_judge:
    judge_type: single
    judge_function: ./examples/reward_function/hylar_reward_function.py:rule_then_api_batch_judge
    api_name: gpt-5
    api_url: https://api.openai.com/v1
    api_key: ${OPENAI_API_KEY}
    api_kwargs: {}
    skip_special_tokens: false

trainer:
  total_epochs: 3
  max_steps: null
  project_name: HyLar_ECCV
  experiment_name: HyLar_ECCV_Training
  logger: ["console", "wandb"]
  nnodes: 1
  n_gpus_per_node: 8
  val_freq: 1
  val_before_train: true
  val_only: false
  val_generations_to_log: -1
  save_freq: 1
  save_limit: 1000
  save_checkpoint_path: null
  load_checkpoint_path: null
  save_samples: true
  samples_save_dir: ./rollout_samples
  samples_save_interval: 1
  max_try_make_batch: 20
